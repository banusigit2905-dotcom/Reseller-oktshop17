<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseller Oktshop17 | Premium Member</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f0f0f; color: white; }
        .bg-red-gradient { background: linear-gradient(135deg, #e63946 0%, #900c3f 100%); }
        .bg-dark-card { background: #1a1a1a; border: 1px solid #333; }
        .text-yellow-brand { color: #f9d71c; }
        .btn-red { background-color: #e63946; transition: 0.3s; }
        .btn-red:hover { background-color: #c41e3a; transform: translateY(-2px); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
        input, textarea { background: #262626 !important; border: 1px solid #444 !important; color: white !important; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        
        <!-- 1. HALAMAN LOGIN -->
        <div id="login-page" class="flex flex-col justify-center min-h-screen px-8">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-full bg-red-gradient mb-4 shadow-lg shadow-red-900/50">
                    <i data-lucide="shopping-bag" class="w-12 h-12 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter">OKTSHOP<span class="text-yellow-brand">17</span></h1>
                <p class="text-gray-400 text-sm">Reseller Exclusive Portal</p>
            </div>

            <div class="glass p-8 rounded-3xl">
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400 ml-1">Email Address</label>
                        <input type="email" id="login-email" class="w-full p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="name@email.com">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 ml-1">Password</label>
                        <input type="password" id="login-pass" class="w-full p-3 rounded-xl focus:ring-2 focus:ring-red-500 outline-none" placeholder="••••••••">
                    </div>
                    <button onclick="handleLogin()" class="btn-red w-full py-4 rounded-xl font-bold shadow-lg shadow-red-600/30 mt-4">MASUK SEKARANG</button>
                </div>
            </div>
            <p class="text-center mt-8 text-gray-500 text-xs italic">"Tingkatkan Transaksi, Raih Poin Melimpah"</p>
        </div>

        <!-- DASHBOARD UTAMA -->
        <div id="main-dashboard" class="hidden animate-in fade-in duration-500">
            <!-- Header Profil -->
            <div class="p-6 bg-red-gradient rounded-b-[40px] shadow-2xl">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-yellow-brand flex items-center justify-center border-2 border-white shadow-lg">
                            <i data-lucide="user" class="text-black w-6 h-6"></i>
                        </div>
                        <div>
                            <p class="text-xs text-red-100">Selamat datang,</p>
                            <h2 id="display-name" class="font-bold text-lg leading-none">Memuat...</h2>
                        </div>
                    </div>
                    <button onclick="handleLogout()" class="p-2 bg-black/20 rounded-lg hover:bg-black/40">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Point Card -->
                <div class="bg-black/30 rounded-2xl p-4 border border-white/10 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] uppercase tracking-widest text-yellow-brand font-bold">Poin Reseller</p>
                        <div class="flex items-baseline gap-1">
                            <span id="display-points" class="text-3xl font-bold text-white">0</span>
                            <span class="text-xs text-gray-300 font-light">PTS</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-red-100 mb-1 italic">Setiap Rp 1.000 = 1 Poin</div>
                        <i data-lucide="award" class="w-8 h-8 text-yellow-brand inline-block"></i>
                    </div>
                </div>
            </div>

            <!-- Konten -->
            <div class="p-6 pb-24">
                <!-- VIEW RESELLER -->
                <div id="reseller-ui" class="hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-white flex items-center gap-2">
                            <i data-lucide="grid" class="w-4 h-4 text-red-500"></i> Katalog Produk
                        </h3>
                    </div>
                    <div id="catalog-container" class="grid grid-cols-2 gap-4">
                        <!-- Produk Render -->
                    </div>
                </div>

                <!-- VIEW ADMIN -->
                <div id="admin-ui" class="hidden space-y-4">
                    <h3 class="font-bold text-yellow-brand border-b border-gray-800 pb-2 flex items-center gap-2">
                        <i data-lucide="shield-check" class="w-5 h-5"></i> Admin Control Panel
                    </h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-dark-card p-4 rounded-2xl">
                            <p class="text-[10px] text-gray-400 uppercase">Reseller Aktif</p>
                            <p id="count-reseller" class="text-2xl font-bold text-white">0</p>
                        </div>
                        <button onclick="showModal('admin-catalog-modal')" class="bg-dark-card p-4 rounded-2xl flex flex-col items-center justify-center hover:bg-gray-800">
                            <i data-lucide="plus-circle" class="w-6 h-6 text-red-500 mb-1"></i>
                            <span class="text-[10px] uppercase">Tambah Produk</span>
                        </button>
                    </div>
                    <button onclick="showModal('admin-orders-modal')" class="w-full bg-yellow-brand text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                        <i data-lucide="shopping-cart" class="w-5 h-5"></i> PESANAN MASUK
                    </button>
                    <button onclick="showModal('admin-bank-modal')" class="w-full bg-white text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                        <i data-lucide="credit-card" class="w-5 h-5"></i> UPDATE REKENING
                    </button>
                </div>
            </div>

            <!-- Bottom Navigation (Hanya Reseller) -->
            <div id="nav-reseller" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/80 backdrop-blur-md border-t border-gray-800 p-4 flex justify-around hidden">
                <button onclick="window.scrollTo(0,0)" class="flex flex-col items-center text-red-500">
                    <i data-lucide="home" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1">Beranda</span>
                </button>
                <button onclick="showModal('orders-modal')" class="flex flex-col items-center text-gray-400">
                    <i data-lucide="package" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1">Pesanan</span>
                </button>
                <button onclick="showModal('profile-modal')" class="flex flex-col items-center text-gray-400">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-1">Profil</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL UPDATE PROFIL -->
    <div id="profile-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center">
        <div class="absolute inset-0 bg-black/80" onclick="closeModal('profile-modal')"></div>
        <div class="relative bg-dark-card w-full max-w-md p-8 rounded-t-[40px] animate-in slide-in-from-bottom duration-300">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-bold mb-6 text-white">Lengkapi Profil Anda</h3>
            <div class="space-y-4">
                <input type="text" id="up-nama" placeholder="Nama Lengkap" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500">
                <input type="text" id="up-hp" placeholder="Nomor WhatsApp" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500">
                <textarea id="up-alamat" placeholder="Alamat Pengiriman Lengkap" class="w-full p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-500 h-24"></textarea>
                <button onclick="updateProfile()" class="btn-red w-full py-4 rounded-2xl font-bold">SIMPAN PERUBAHAN</button>
                <button onclick="closeModal('profile-modal')" class="w-full py-3 text-gray-400 text-sm">Kembali</button>
            </div>
        </div>
    </div>

    <!-- MODAL TAMBAH PRODUK (ADMIN) -->
    <div id="admin-catalog-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/90"></div>
        <div class="relative bg-dark-card w-full max-w-sm p-6 rounded-3xl border border-gray-700">
            <h3 class="text-lg font-bold mb-4 text-yellow-brand">Tambah Produk Baru</h3>
            <div class="space-y-3">
                <input type="text" id="prod-nama" placeholder="Nama Produk" class="w-full p-3 rounded-xl outline-none">
                <input type="number" id="prod-harga" placeholder="Harga (Rp)" class="w-full p-3 rounded-xl outline-none">
                <input type="text" id="prod-img" placeholder="Link URL Foto Produk" class="w-full p-3 rounded-xl outline-none">
                <button onclick="addProduct()" class="w-full bg-white text-black font-bold py-3 rounded-xl mt-4">PUBLIKASI KATALOG</button>
                <button onclick="closeModal('admin-catalog-modal')" class="w-full text-red-500 text-sm py-2">Batal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, getDocs, addDoc, onSnapshot, where } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE (Ganti dengan Config Anda) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;

        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        // --- AUTH ---
        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return alert("Isi email dan password!");
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { 
                alert("Login Gagal: Periksa kembali akun Anda."); 
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    currentUserData = userSnap.data();
                } else {
                    currentUserData = { nama: "Reseller Baru", role: "reseller", points: 0, hp: "", alamat: "" };
                    await setDoc(userRef, currentUserData);
                }
                renderDashboard(user.uid);
            } else {
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');
            }
        });

        function renderDashboard(uid) {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('display-name').innerText = currentUserData.nama;
            document.getElementById('display-points').innerText = (currentUserData.points || 0).toLocaleString();

            if (currentUserData.role === 'admin') {
                document.getElementById('admin-ui').classList.remove('hidden');
                document.getElementById('reseller-ui').classList.add('hidden');
                document.getElementById('nav-reseller').classList.add('hidden');
                loadAdminStats();
            } else {
                document.getElementById('reseller-ui').classList.remove('hidden');
                document.getElementById('admin-ui').classList.add('hidden');
                document.getElementById('nav-reseller').classList.remove('hidden');
                loadCatalog();
            }
            lucide.createIcons();
        }

        // --- KATALOG ---
        function loadCatalog() {
            const q = query(collection(db, "products"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('catalog-container');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const p = doc.data();
                    container.innerHTML += `
                        <div class="bg-dark-card rounded-2xl overflow-hidden shadow-lg border border-gray-800">
                            <img src="${p.img || 'https://via.placeholder.com/200x200?text=No+Image'}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="text-xs font-semibold text-gray-200 truncate">${p.nama}</h4>
                                <p class="text-yellow-brand font-bold text-sm mb-3">Rp ${parseInt(p.harga).toLocaleString()}</p>
                                <div class="flex gap-1">
                                    <button onclick="orderProduct('${doc.id}', ${p.harga})" class="flex-1 bg-red-600 text-white text-[10px] py-2 rounded-lg font-bold">BELI</button>
                                    <button onclick="askStock('${p.nama}')" class="bg-gray-700 px-2 rounded-lg"><i data-lucide="message-circle" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            });
        }

        window.orderProduct = async (id, harga) => {
            if(!confirm("Buat pesanan sekarang?")) return;
            const poin = Math.floor(harga / 1000);
            await addDoc(collection(db, "orders"), {
                userId: auth.currentUser.uid,
                namaUser: currentUserData.nama,
                harga: harga,
                status: "Pending",
                tanggal: new Date().toLocaleDateString()
            });
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { points: (currentUserData.points || 0) + poin });
            alert("Pesanan dibuat! + " + poin + " Poin ditambahkan.");
        };

        window.askStock = (nama) => {
            window.open(`https://wa.me/628123456789?text=Halo, stok ${nama} ready?`);
        };

        // --- ADMIN ---
        async function loadAdminStats() {
            const snap = await getDocs(collection(db, "users"));
            document.getElementById('count-reseller').innerText = snap.size;
        }

        window.addProduct = async () => {
            const nama = document.getElementById('prod-nama').value;
            const harga = document.getElementById('prod-harga').value;
            const img = document.getElementById('prod-img').value;
            if(nama && harga) {
                await addDoc(collection(db, "products"), { nama, harga: parseInt(harga), img });
                alert("Katalog diupdate!");
                closeModal('admin-catalog-modal');
            }
        };

        // --- UTILS ---
        window.showModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.updateProfile = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, {
                nama: document.getElementById('up-nama').value,
                hp: document.getElementById('up-hp').value,
                alamat: document.getElementById('up-alamat').value
            });
            alert("Profil Berhasil Disimpan!");
            closeModal('profile-modal');
        };

    </script>
</body>
</html>
